services:
  - type: web
    name: mockmate-backend
    env: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20.x
      - key: PORT
        value: 5000
      - key: MONGO_URI
        sync: false # You will need to add this manually in the Render dashboard
      - key: OPENAI_API_KEY
        sync: false # You will need to add this manually in the Render dashboard
